<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento | Vezclic</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-color: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; scroll-behavior: smooth; }
        
        .glass-footer { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-top: 1px solid #f1f5f9; }

        .service-card { 
            background: #ffffff; 
            border: 1px solid #f1f5f9; 
            border-radius: 1.25rem; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }

        .service-card.selected { 
            background-color: var(--primary-color) !important; 
            border-color: var(--primary-color) !important;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        
        .service-card.selected p, 
        .service-card.selected span { color: #ffffff !important; }
        .service-card.selected .text-slate-400 { color: rgba(255,255,255,0.7) !important; }

        .dynamic-bg { background-color: var(--primary-color) !important; }
        .selected-item { background-color: var(--primary-color) !important; color: #ffffff !important; border-color: var(--primary-color) !important; }
        .selected-item span { color: #ffffff !important; }

        .step-hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .spinner { width: 28px; height: 28px; border: 3px solid #f1f5f9; border-top: 3px solid var(--primary-color); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .check-circle { width: 60px; height: 60px; border-radius: 50%; background: #22c55e; display: flex; align-items: center; justify-content: center; animation: scaleUp 0.4s forwards; }
        @keyframes scaleUp { from { transform: scale(0); } to { transform: scale(1); } }

        .uppercase-input { text-transform: uppercase; font-weight: 700; letter-spacing: 0.025em; }
    </style>
</head>
<body class="pb-32">

    <div id="loading-screen" class="fixed inset-0 bg-white z-[200] flex flex-col items-center justify-center p-6 text-center">
        <div id="loader-spinner" class="spinner mb-3"></div>
        <p id="loader-text" class="text-[11px] font-bold text-slate-400 uppercase tracking-widest italic">buscando empresa...</p>
    </div>

    <div id="app-content">
        <header class="relative pb-4 text-center">
            <div class="h-32 w-full bg-slate-900 overflow-hidden relative">
                <img id="db-cover" src="https://images.unsplash.com/photo-1598133894008-61f7fdb8cc3a?q=80&w=1000" class="w-full h-full object-cover opacity-50">
                <div class="absolute inset-0 bg-gradient-to-t from-[#f8fafc] to-transparent"></div>
            </div>

            <div class="flex flex-col items-center -mt-16 relative z-10 px-6">
                <div class="w-24 h-24 rounded-full border-[5px] border-white shadow-2xl overflow-hidden bg-white mb-4">
                    <img id="db-profile" src="" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/200x200?text=Logo'">
                </div>

                <div class="px-6">
                    <div class="flex items-center justify-center gap-1.5 mb-1">
                        <h1 id="db-name" class="text-xl font-bold text-slate-900 tracking-tight truncate max-w-[250px]">Carregando...</h1>
                        <div id="verified-icon" class="bg-[#3b82f6] text-white rounded-full p-0.5 hidden shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        </div>
                    </div>
                    <p id="db-bio" class="text-sm text-slate-500 font-medium leading-relaxed max-w-xs"></p> 
                </div>

                <div id="header-buttons" class="flex justify-center gap-3 mt-4">
                    <button onclick="toggleContactModal()" class="flex items-center gap-2 px-6 py-2 rounded-full bg-white border border-slate-200 text-xs font-bold text-slate-700 shadow-sm active:scale-95 transition-all">
                        <i class="ph ph-chat-circle text-lg"></i> Contato
                    </button>
                    <button onclick="openMaps()" class="flex items-center gap-2 px-6 py-2 rounded-full bg-white border border-slate-200 text-xs font-bold text-slate-700 shadow-sm active:scale-95 transition-all">
                        <i class="ph ph-map-pin text-lg"></i> Endereço
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-md mx-auto mt-6 px-5 space-y-10">
            <section id="notices-section" class="bg-[#f1f5f9] rounded-2xl p-5 border border-slate-100 hidden fade-in">
                <p id="db-notices" class="text-xs text-slate-500 leading-relaxed font-medium italic"></p>
            </section>

            <section id="step-services" class="fade-in">
                <div class="flex justify-between items-baseline mb-5">
                    <h2 class="text-lg font-extrabold text-slate-900 tracking-tight">1. Escolha o serviço</h2>
                    <span class="step-counter text-[10px] text-slate-400 font-bold uppercase tracking-widest"></span>
                </div>
                <div id="services-list" class="space-y-4"></div>
            </section>

            <section id="step-pro" class="step-hidden">
                <div class="flex justify-between items-baseline mb-5">
                    <h2 class="text-lg font-extrabold text-slate-900 tracking-tight">2. Profissional</h2>
                    <span class="step-counter text-[10px] text-slate-400 font-bold uppercase tracking-widest"></span>
                </div>
                <div id="pros-list" class="grid grid-cols-2 gap-4"></div>
            </section>

            <section id="step-date" class="step-hidden">
                <div class="flex justify-between items-baseline mb-5">
                    <h2 class="text-lg font-extrabold text-slate-900 tracking-tight">3. Escolha o dia</h2>
                    <span class="step-counter text-[10px] text-slate-400 font-bold uppercase tracking-widest"></span>
                </div>
                <div id="calendar-grid" class="grid grid-cols-2 gap-3.5 mb-4"></div>
                <button onclick="loadMoreDays()" class="w-full py-4 text-[11px] font-bold text-slate-400 uppercase border-2 border-dashed border-slate-100 rounded-2xl">+ Ver mais datas</button>
            </section>

            <section id="step-time" class="step-hidden">
                <div class="flex justify-between items-baseline mb-5">
                    <h2 class="text-lg font-extrabold text-slate-900 tracking-tight">4. Horários</h2>
                    <span class="step-counter text-[10px] text-slate-400 font-bold uppercase tracking-widest"></span>
                </div>
                <div id="times-grid" class="grid grid-cols-3 gap-3"></div>
            </section>

            <section id="step-data" class="step-hidden">
                <div class="flex justify-between items-baseline mb-5">
                    <h2 class="text-lg font-extrabold text-slate-900 tracking-tight">5. Finalizar</h2>
                    <span class="step-counter text-[10px] text-slate-400 font-bold uppercase tracking-widest"></span>
                </div>
                <div class="space-y-4">
                    <input type="text" id="client-name" maxlength="30" placeholder="SEU NOME COMPLETO" class="uppercase-input w-full p-5 bg-white border border-slate-200 rounded-full text-sm focus:ring-4 focus:ring-slate-100 outline-none transition-all">
                    <input type="tel" id="client-phone" oninput="maskPhone(this)" placeholder="WHATSAPP COM DDD" class="uppercase-input w-full p-5 bg-white border border-slate-200 rounded-full text-sm focus:ring-4 focus:ring-slate-100 outline-none transition-all">
                </div>
            </section>
        </main>

        <div id="summary-bar" class="fixed bottom-0 left-0 right-0 glass-footer px-6 py-4 transform translate-y-full transition-transform duration-500 z-50">
            <div class="max-w-md mx-auto flex justify-between items-center">
                <div class="flex flex-col text-left">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Total</p>
                    <span class="text-xl font-bold text-slate-900 tracking-tight leading-none" id="display-price">R$ 0,00</span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase mt-1" id="display-time">0 min</span>
                </div>
                <div class="flex items-center gap-2"> 
                    <button id="back-btn" onclick="goBack()" class="step-hidden bg-slate-100 text-slate-500 w-11 h-11 flex items-center justify-center rounded-full active:scale-95 transition-all">
                        <i class="ph ph-arrow-left text-lg font-bold"></i>
                    </button>
                    <button onclick="processFlow()" id="main-action-btn" class="dynamic-bg text-white px-7 h-11 rounded-full font-bold text-xs uppercase tracking-widest shadow-xl active:scale-95 transition-all">
                        Continuar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="step-success" class="fixed inset-0 bg-white z-[300] flex flex-col items-center justify-center p-8 text-center hidden">
        <div class="check-circle mb-6"><i class="ph ph-check text-white text-3xl font-bold"></i></div>
        <h2 class="text-2xl font-extrabold text-slate-900 mb-2 tracking-tight uppercase">Agendado!</h2>
        <p class="text-slate-500 text-sm font-medium">Abrindo WhatsApp...</p>
    </div>

    <div id="contact-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] flex items-center justify-center p-6 hidden">
        <div class="bg-white w-full max-w-xs rounded-3xl p-7 shadow-2xl">
            <h3 class="text-lg font-bold text-center mb-6 tracking-tight">Fale Conosco</h3>
            <div class="space-y-3">
                <a id="db-whatsapp-link" href="#" target="_blank" class="flex items-center justify-center gap-3 p-4 bg-[#f1ffe5] border border-green-100 rounded-2xl text-green-700 font-bold text-sm">
                    <i class="ph ph-whatsapp-logo text-xl"></i> WhatsApp
                </a>
                <a id="db-instagram-link" href="#" target="_blank" class="flex items-center justify-center gap-3 p-4 bg-[#fff1f6] border border-pink-100 rounded-2xl text-pink-700 font-bold text-sm">
                    <i class="ph ph-instagram-logo text-xl"></i> Instagram
                </a>
            </div>
            <button onclick="toggleContactModal()" class="mt-6 w-full py-3 text-slate-400 font-bold text-xs uppercase">Fechar</button>
        </div>
    </div>

    <script>
        // ══════════════════════════════════════════════
        // CONEXÃO COM O SEU BANCO DE DADOS SUPABASE
        // ══════════════════════════════════════════════
        const supabaseUrl = 'https://nojkeyqycpvnolnuzwnj.supabase.co';
        const supabaseKey = 'sb_publishable_v16thezDVJS97xDtzo8SmA_X9tz3G4M';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let companyId, companyData, businessHours = [], existingAppointments = [];
        let currentStep = 1, selectedProName = "", selectedDate = "", selectedTimeValue = "";
        let hasColaboradores = false, displayedDaysCount = 0, currentServiceDuration = 30;

        function convertToCompanyDayIdx(momentDay) { return momentDay === 0 ? 6 : momentDay - 1; }

        function showScreenError(title, description) {
            document.getElementById('loader-spinner').style.display = 'none';
            document.getElementById('loading-screen').innerHTML = `
                <div class="max-w-xs bg-red-50 text-red-800 p-6 rounded-2xl border border-red-100 shadow-sm mx-auto">
                    <i class="ph ph-warning-circle text-3xl mb-2 text-red-500 block"></i>
                    <h3 class="font-bold text-sm uppercase tracking-wide mb-1">${title}</h3>
                    <p class="text-xs text-slate-600 leading-relaxed font-medium">${description}</p>
                </div>
            `;
        }

        async function loadAllData() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('s') || urlParams.get('u');
            
            if (!slug) {
                showScreenError(
                    "Link Incompleto", 
                    "Nenhuma empresa foi definida na URL. Use o formato correto: <br><code class='bg-white px-1.5 py-0.5 rounded text-red-600 font-mono text-[10px] block mt-2 border border-red-100'>?s=empresa-teste</code>"
                );
                return;
            }

            try {
                let query = supabaseClient.from('empresas').select('*');
                
                if (!isNaN(slug)) {
                    query = query.eq('id', parseInt(slug));
                } else {
                    const nomeComEspaco = slug.replace(/-/g, ' ');
                    query = query.or(`empresa.ilike.%${slug}%,empresa.ilike.%${nomeComEspaco}%`);
                }

                const { data: profs, error: e1 } = await query;
                
                if (e1 || !profs || profs.length === 0) {
                    showScreenError("Não Encontrado", "Esta empresa não está cadastrada ou o link está digitado incorretamente.");
                    return;
                }
                
                const prof = profs[0];
                companyData = prof; 
                companyId = prof.id;

                const nomeEmpresa = prof.empresa || "Empresa";
                document.getElementById('db-name').innerText = nomeEmpresa;
                
                if (nomeEmpresa.length < 25) document.getElementById('verified-icon').classList.remove('hidden');
                document.getElementById('db-bio').innerText = prof.bio || "";
                if(prof.logo_url) document.getElementById('db-profile').src = prof.logo_url;
                
                if (prof.cor_primaria) document.documentElement.style.setProperty('--primary-color', prof.cor_primaria);

                if (prof.avisos && prof.avisos.trim().length > 0) {
                    document.getElementById('db-notices').innerText = prof.avisos;
                    document.getElementById('notices-section').classList.remove('hidden');
                }

                if(prof.whatsapp) document.getElementById('db-whatsapp-link').href = `https://wa.me/${prof.whatsapp.replace(/\D/g,'')}`;
                if(prof.instagram) document.getElementById('db-instagram-link').href = `https://instagram.com/${prof.instagram?.replace('@','')}`;

                try {
                    const { data: pros = [] } = await supabaseClient.from('colaboradores').select('*').eq('empresa_id', companyId);
                    hasColaboradores = (pros && pros.length > 0);
                    if (hasColaboradores) renderProfessionals(pros, prof);
                } catch(e) {
                    hasColaboradores = false;
                }
                
                selectedProName = hasColaboradores ? "" : nomeEmpresa;

                const { data: servs = [] } = await supabaseClient.from('servicos').select('*').eq('empresa_id', companyId);
                renderServices(servs || []);
                
                const { data: hrs = [] } = await supabaseClient.from('horarios').select('*').eq('empresa_id', companyId);
                businessHours = hrs || [];

                const { data: agends = [] } = await supabaseClient.from('agendamentos').select('data_hora, profissional_nome').eq('empresa_id', companyId);
                existingAppointments = agends || [];

                updateStepNumbers();
                
                document.getElementById('loading-screen').classList.add('hidden');
                generateCalendar(8, true);

            } catch (e) { 
                console.error(e);
                showScreenError("Erro de Conexão", "Falha ao ler dados do banco. Verifique as tabelas do seu projeto.");
            }
        }

        function getAvailableSlots(dateISO, momentDayIdx) {
            const config = businessHours.find(h => parseInt(h.dia_semana) === convertToCompanyDayIdx(momentDayIdx));
            if(!config || !config.ativo) return [];

            let slots = [];
            let current = moment(config.abre_as, "HH:mm:ss");
            const endHour = moment(config.fecha_as, "HH:mm:ss");
            const pStart = config.pausa_inicio && config.pausa_inicio !== "NULL" && config.pausa_inicio !== null ? moment(config.pausa_inicio, "HH:mm:ss") : null;
            const pEnd = config.pausa_fim && config.pausa_fim !== "NULL" && config.pausa_fim !== null ? moment(config.pausa_fim, "HH:mm:ss") : null;

            while(current.isBefore(endHour)) {
                const timeStr = current.format("HH:mm");
                const slotStart = moment(`${dateISO} ${timeStr}`, "YYYY-MM-DD HH:mm");
                const slotEnd = slotStart.clone().add(currentServiceDuration, 'minutes');
                
                if (slotEnd.isAfter(moment(`${dateISO} ${config.fecha_as}`, "YYYY-MM-DD HH:mm:ss"))) {
                    current.add(30, 'minutes'); continue;
                }

                const isPaused = pStart && pEnd && (slotStart.isBefore(pEnd.clone().set({year: slotStart.year(), month: slotStart.month(), date: slotStart.date()})) && slotEnd.isAfter(pStart.clone().set({year: slotStart.year(), month: slotStart.month(), date: slotStart.date()})));
                
                const isOccupied = existingAppointments.some(a => {
                    const agInicio = moment(a.data_hora); 
                    const agFim = agInicio.clone().add(30, 'minutes'); 
                    const conflito = (slotStart.isBefore(agFim) && slotEnd.isAfter(agInicio));
                    
                    return hasColaboradores ? (conflito && a.profissional_nome === selectedProName) : conflito;
                });

                if(!isPaused && !isOccupied) slots.push(timeStr);
                current.add(30, 'minutes');
            }
            return slots;
        }

        function generateCalendar(count, clear = false) {
            const grid = document.getElementById('calendar-grid');
            if(clear) { grid.innerHTML = ""; displayedDaysCount = 0; }
            const baseDate = moment().startOf('day');
            const daysOfWeek = ["DOM", "SEG", "TER", "QUA", "QUI", "SEX", "SÁB"];
            const months = ["JAN", "FEV", "MAR", "ABR", "MAI", "JUN", "JUL", "AGO", "SET", "OUT", "NOV", "DEZ"];

            for (let i = 0; i < count; i++) {
                const targetDate = baseDate.clone().add(displayedDaysCount, 'days');
                const momentDayIdx = targetDate.day();
                const dateISO = targetDate.format("YYYY-MM-DD");
                const configDia = businessHours.find(h => parseInt(h.dia_semana) === convertToCompanyDayIdx(momentDayIdx));
                const slotsDisponiveis = getAvailableSlots(dateISO, momentDayIdx);

                const btn = document.createElement('button');
                if (configDia?.ativo && slotsDisponiveis.length > 0) {
                    btn.className = "date-btn py-2.5 px-4 bg-white border border-slate-100 rounded-2xl transition-all flex flex-col items-center justify-center active:scale-95";
                    btn.onclick = () => selectDate(btn, dateISO, momentDayIdx);
                } else {
                    btn.className = "py-2.5 px-4 bg-slate-50 border border-slate-50 rounded-2xl flex flex-col items-center justify-center opacity-30 cursor-not-allowed";
                    btn.disabled = true;
                }
                btn.innerHTML = `<span class="text-[9px] font-bold text-slate-300 uppercase mb-0.5">${daysOfWeek[momentDayIdx]}</span><span class="text-lg font-extrabold text-slate-800">${targetDate.date()}</span><span class="text-[9px] font-bold text-slate-400 uppercase">${months[targetDate.month()]}</span>`;
                grid.appendChild(btn);
                displayedDaysCount++;
            }
        }

        function loadMoreDays() { generateCalendar(8, false); }

        async function saveAndFinish() {
            const name = document.getElementById('client-name').value.trim().toUpperCase();
            const phone = document.getElementById('client-phone').value;
            const service = document.querySelector('.service-checkbox:checked');
            
            if (name.length < 3) return alert("INSIRA SEU NOME");
            if (phone.replace(/\D/g,'').length < 11) return alert("WHATSAPP INVÁLIDO");
            if (!service) return alert("SELECIONE UM SERVIÇO");

            const btn = document.getElementById('main-action-btn');
            btn.disabled = true; btn.innerText = "AGUARDE...";
            
            try {
                const dataParaSalvar = moment(`${selectedDate} ${selectedTimeValue}`, "YYYY-MM-DD HH:mm").format("YYYY-MM-DD HH:mm:ss");
                
                const { error } = await supabaseClient.from('agendamentos').insert({
                    empresa_id: companyId, 
                    nome_cliente: name, 
                    whatsapp_cliente: phone.replace(/\D/g,''),
                    data_hora: dataParaSalvar, 
                    profissional_nome: selectedProName,
                    status: 'pendente', 
                    servico_id: service.getAttribute('data-id')
                });

                if (error) throw new Error(error.message);

                document.getElementById('app-content').classList.add('hidden');
                document.getElementById('step-success').classList.remove('hidden');
                const msg = encodeURIComponent(`Olá! Novo agendamento:\n👤 Cliente: ${name}\n📅 Data: ${moment(selectedDate).format('DD/MM')}\n⏰ Hora: ${selectedTimeValue}`);
                setTimeout(() => { window.open(`https://wa.me/${companyData.whatsapp.replace(/\D/g,'')}?text=${msg}`, '_blank'); location.reload(); }, 2000);
            } catch (e) { 
                alert("Erro ao salvar agendamento: " + e.message); 
                btn.disabled = false; 
                btn.innerText = "RESERVAR"; 
            }
        }

        function maskPhone(i) {
            let v = i.value.replace(/\D/g, "").substring(0, 11);
            if (v.length > 10) i.value = `(${v.substring(0, 2)}) ${v.substring(2, 7)}-${v.substring(7, 11)}`;
            else if (v.length > 2) i.value = `(${v.substring(0, 2)}) ${v.substring(2)}`;
            else i.value = v;
        }

        function selectDate(btn, dateISO, momentDayIdx) {
            document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('selected-item'));
            btn.classList.add('selected-item');
            selectedDate = dateISO;
            generateTimeSlots(momentDayIdx);
        }

        function generateTimeSlots(momentDayIdx) {
            const grid = document.getElementById('times-grid');
            grid.innerHTML = "";
            const slots = getAvailableSlots(selectedDate, momentDayIdx);
            if (slots.length === 0) { grid.innerHTML = "<p class='col-span-3 text-center text-slate-400 py-4 text-[10px] font-bold uppercase'>Sem vagas</p>"; return; }
            slots.forEach(timeStr => {
                const b = document.createElement('button');
                b.className = "time-btn py-3.5 bg-white border border-slate-100 rounded-xl text-xs font-bold text-slate-700 transition-all active:scale-95";
                b.innerText = timeStr;
                b.onclick = () => { document.querySelectorAll('.time-btn').forEach(x => x.classList.remove('selected-item')); b.classList.add('selected-item'); selectedTimeValue = timeStr; };
                grid.appendChild(b);
            });
        }

        function handleServiceChange() {
            const checks = document.querySelectorAll('.service-checkbox:checked');
            let total = 0, time = 0;
            document.querySelectorAll('.service-card').forEach(card => card.classList.remove('selected'));
            
            checks.forEach(c => { 
                total += parseFloat(c.getAttribute('data-price')) || 0; 
                const durationAttribute = parseInt(c.getAttribute('data-time'));
                time += isNaN(durationAttribute) ? 30 : durationAttribute;
                c.closest('.service-card').classList.add('selected');
            });
            
            currentServiceDuration = time > 0 ? time : 30;
            document.getElementById('display-price').innerText = `R$ ${total.toFixed(2).replace('.',',')}`;
            document.getElementById('display-time').innerText = `${currentServiceDuration} MIN`;
            document.getElementById('summary-bar').classList.toggle('translate-y-full', total === 0);
            if(selectedDate) generateTimeSlots(moment(selectedDate).day());
            generateCalendar(8, true);
        }

        function renderServices(list = []) {
            const container = document.getElementById('services-list');
            if(!list || !list.length) { container.innerHTML = "<p class='text-center text-slate-400 text-xs py-4'>Nenhum serviço cadastrado.</p>"; return; }
            
            container.innerHTML = list.map(s => {
                const duracaoLimpa = parseInt(s.duracao) || 30;
                return `
                <div class="service-card relative transition-all duration-300">
                    <input type="checkbox" id="srv-${s.id}" class="hidden service-checkbox" data-price="${s.preco}" data-time="${duracaoLimpa}" data-id="${s.id}">
                    <label for="srv-${s.id}" onclick="setTimeout(handleServiceChange, 50)" class="flex justify-between items-center p-5 cursor-pointer">
                        <div class="flex-1 min-w-0 pr-4 text-left">
                            <p class="font-bold text-slate-800 text-sm uppercase tracking-tight">${s.nome}</p>
                            ${s.descricao ? `<p class="text-[10px] text-slate-400 mt-1 font-medium truncate">${s.descricao}...</p>` : ''}
                        </div>
                        <div class="flex flex-col items-end min-w-fit shrink-0">
                            <span class="font-bold text-slate-900 text-sm tracking-tight">R$ ${parseFloat(s.preco).toFixed(2).replace('.',',')}</span>
                            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">${duracaoLimpa} MIN</span>
                        </div>
                    </label>
                </div>`;
            }).join('');
        }

        function renderProfessionals(pros = [], owner = {}) {
            const container = document.getElementById('pros-list');
            const ownerName = owner.nome_empresa || "Geral";
            let html = `<button onclick="selectPro(this, '${ownerName}')" class="pro-btn p-5 bg-white border border-slate-100 rounded-3xl text-center flex flex-col items-center"><div class="w-14 h-14 rounded-full overflow-hidden mb-2 shadow-sm border-2 border-white"><img src="${owner.logo_url || ''}" onerror="this.src='https://placehold.co/200x200?text=Logo'" class="w-full h-full object-cover"></div><p class="font-bold text-[10px] text-slate-800 uppercase tracking-tighter truncate w-full">${ownerName.split(' ')[0]}</p></button>`;
            if (pros && pros.length) {
                html += pros.map(p => `<button onclick="selectPro(this, '${p.nome}')" class="pro-btn p-5 bg-white border border-slate-100 rounded-3xl text-center flex flex-col items-center"><div class="w-14 h-14 rounded-full overflow-hidden mb-2 shadow-sm border-2 border-white"><img src="${p.foto_url || ''}" onerror="this.src='https://placehold.co/200x200?text=Foto'" class="w-full h-full object-cover"></div><p class="font-bold text-[10px] text-slate-800 uppercase tracking-tighter truncate w-full">${p.nome.split(' ')[0]}</p></button>`).join('');
            }
            container.innerHTML = html;
        }

        function selectPro(btn, name) { 
            document.querySelectorAll('.pro-btn').forEach(b => b.classList.remove('selected-item')); btn.classList.add('selected-item'); 
            selectedProName = name; if(selectedDate) generateTimeSlots(moment(selectedDate).day()); 
        }

        function updateStepNumbers() {
            const total = hasColaboradores ? 5 : 4;
            const counters = document.querySelectorAll('.step-counter');
            if(counters.length) { counters.forEach(c => c.innerText = `PASSO ${currentStep} DE ${total}`); }
        }

        function processFlow() {
            const btnText = document.getElementById('main-action-btn');
            if (currentStep === 1) {
                if (document.querySelectorAll('.service-checkbox:checked').length === 0) return;
                ['step-services','header-buttons','notices-section'].forEach(id => document.getElementById(id).classList.add('step-hidden'));
                document.getElementById('back-btn').classList.remove('step-hidden');
                if (hasColaboradores) { document.getElementById('step-pro').classList.remove('step-hidden'); currentStep = 2; }
                else { document.getElementById('step-date').classList.remove('step-hidden'); currentStep = 3; }
            } else if (currentStep === 2) { 
                if (!selectedProName) return; 
                document.getElementById('step-pro').classList.add('step-hidden'); document.getElementById('step-date').classList.remove('step-hidden'); currentStep = 3; 
            } else if (currentStep === 3) { 
                if (!selectedDate) return; 
                document.getElementById('step-date').classList.add('step-hidden'); document.getElementById('step-time').classList.remove('step-hidden'); currentStep = 4; 
            } else if (currentStep === 4) { 
                if (!selectedTimeValue) return; 
                document.getElementById('step-time').classList.add('step-hidden'); document.getElementById('step-data').classList.remove('step-hidden'); 
                btnText.innerText = "RESERVAR"; currentStep = 5; 
            } else if (currentStep === 5) { saveAndFinish(); }
            updateStepNumbers(); window.scrollTo(0,0);
        }

        function goBack() {
            const btnText = document.getElementById('main-action-btn');
            if (currentStep === 2 || (currentStep === 3 && !hasColaboradores)) { 
                ['step-pro','step-date'].forEach(id => document.getElementById(id).classList.add('step-hidden')); 
                ['step-services','header-buttons'].forEach(id => document.getElementById(id).classList.remove('step-hidden')); 
                if (companyData.avisos && companyData.avisos.trim().length > 0) document.getElementById('notices-section').classList.remove('hidden');
                document.getElementById('back-btn').classList.add('step-hidden'); currentStep = 1; 
                btnText.innerText = "CONTINUAR";
            } else if (currentStep === 3) { 
                document.getElementById('step-date').classList.add('step-hidden'); document.getElementById('step-pro').classList.remove('step-hidden'); currentStep = 2; 
            } else if (currentStep === 4) { 
                document.getElementById('step-time').classList.add('step-hidden'); document.getElementById('step-date').classList.remove('step-hidden'); currentStep = 3; 
            } else if (currentStep === 5) { 
                document.getElementById('step-data').classList.add('step-hidden'); document.getElementById('step-time').classList.remove('step-hidden'); 
                btnText.innerText = "CONTINUAR"; currentStep = 4; 
            }
            updateStepNumbers(); window.scrollTo(0,0);
        }

        function openMaps() { 
            if(!companyData || !companyData.endereco_rua) return alert("Endereço não cadastrado."); 
            const address = `${companyData.endereco_rua}, ${companyData.endereco_numero}, ${companyData.endereco_cidade} - ${companyData.endereco_estado}`;
            window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`, '_blank'); 
        }

        function toggleContactModal() { document.getElementById('contact-modal').classList.toggle('hidden'); }
        
        window.onload = loadAllData;
    </script>
</body>
</html>
